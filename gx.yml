# gx.yml - Sample configuration file
default-user-org: "scottidler"
jobs: "nproc"
token-path: "~/.config/github/tokens/{user_or_org}"  # {user_or_org} is replaced at runtime

# Repository discovery settings
repo-discovery:
  max-depth: 3  # Maximum directory depth to scan (default: 3)
  ignore-patterns:
    - "node_modules"
    - ".git"
    - "target"
    - "build"

# Output preferences
output:
  verbosity: summary  # compact, summary, detailed, or full (default: summary)
  # `gx status` marks bare-container worktrees with a connector glyph glued
  # onto the repo slug (always on, not a toggle - layout is ground truth):
  #   slug≡leaf   folder name matches the checked-out branch (branch column blank)
  #   slug≈leaf   folder name disagrees with the checked-out branch (branch shown)
  #   slug        a normal flat clone (unchanged)
  # `gx checkout`/`create`/`review` are unaffected - their branch column is a
  # change ID, not a checked-out branch.

# Logging
logging:
  level: "info"
  file: "~/.local/share/gx/logs/gx.log"
