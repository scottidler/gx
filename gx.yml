# gx.yml - Sample configuration file
default-user-org: "scottidler"
jobs: "nproc"
token-path: "~/.config/github/tokens/{user_or_org}"  # {user_or_org} is replaced at runtime

# Repository discovery settings
repo-discovery:
  max-depth: 3  # Maximum directory depth to scan (default: 3)
  ignore-patterns:
    - "node_modules"
    - ".git"
    - "target"
    - "build"

# `gx create` settings
create:
  confirm-threshold: 5  # prompt before committing to more than this many repos
  # `gx create ... llm "<prompt>"` runs an agent per repo in a throwaway
  # worktree, then proposes the resulting diff for review.
  llm:
    # The agent command; the prompt is appended as the final argument and the
    # CWD is the temp worktree. NOTE: `--permission-mode acceptEdits` is
    # REQUIRED - in print (`-p`) mode Claude Code will not edit files without an
    # edit-granting permission mode, so a bare `claude -p --output-format text`
    # would write nothing and every propose would be a false "empty" outcome.
    agent-command: "claude -p --output-format text --permission-mode acceptEdits"
    timeout-seconds: 300  # wall-clock per repo; on expiry the agent's whole process group is killed

# Output preferences
output:
  verbosity: summary  # compact, summary, detailed, or full (default: summary)
  # `gx status` marks bare-container worktrees with a connector glyph glued
  # onto the repo slug (always on, not a toggle - layout is ground truth):
  #   slug≡leaf   folder name matches the checked-out branch (branch column blank)
  #   slug≈leaf   folder name disagrees with the checked-out branch (branch shown)
  #   slug        a normal flat clone (unchanged)
  # `gx checkout`/`create`/`review` are unaffected - their branch column is a
  # change ID, not a checked-out branch.

# Logging
logging:
  level: "info"
  file: "~/.local/share/gx/logs/gx.log"
