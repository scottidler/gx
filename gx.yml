# gx.yml - Sample configuration file
default-user-org: "scottidler"
jobs: "nproc"

# Wall-clock timeout (seconds) for EVERY git/gh subprocess. On expiry the child's
# whole process group is SIGKILLed and that repo reports a timeout error while the
# rest of the run continues to its summary. One value covers fast local git and
# slow network fetches alike; stdin is nulled so credential/auth prompts fail fast
# rather than wedging. Default: 300. Uncomment to override:
# subprocess-timeout-secs: 300

# Repository discovery settings
repo-discovery:
  max-depth: 3  # Maximum directory depth to scan (default: 3)
  ignore-patterns:
    - "node_modules"
    - ".git"
    - "target"
    - "build"

# `gx create` settings
create:
  confirm-threshold: 5  # prompt before committing to more than this many repos
  # `gx create ... llm "<prompt>"` runs an agent per repo in a throwaway
  # worktree, then proposes the resulting diff for review.
  llm:
    # The agent command; the prompt is appended as the final argument and the
    # CWD is the temp worktree. NOTE: `--permission-mode acceptEdits` is
    # REQUIRED - in print (`-p`) mode Claude Code will not edit files without an
    # edit-granting permission mode, so a bare `claude -p --output-format text`
    # would write nothing and every propose would be a false "empty" outcome.
    agent-command: "claude -p --output-format text --permission-mode acceptEdits"
    timeout-seconds: 300  # wall-clock per repo; on expiry the agent's whole process group is killed

# Output preferences
output:
  verbosity: summary  # compact, summary, detailed, or full (default: summary)
  # `gx status` marks bare-container worktrees with a connector glyph glued
  # onto the repo slug (always on, not a toggle - layout is ground truth):
  #   slug≡leaf   folder name matches the checked-out branch (branch column blank)
  #   slug≈leaf   folder name disagrees with the checked-out branch (branch shown)
  #   slug        a normal flat clone (unchanged)
  # `gx checkout`/`create`/`review` are unaffected - their branch column is a
  # change ID, not a checked-out branch.

# Logging
logging:
  level: "info"
  file: "~/.local/share/gx/logs/gx.log"

# GitHub-related settings (design doc 2026-07-12-persona-aware-github-auth.md)
github:
  # Token env-var resolution. Built-in: tatari-tv -> $GITHUB_PAT_WORK, else -> $GITHUB_PAT_HOME.
  # GH_PERSONA=work|home overrides per-run. Uncomment to add overrides (names, never secrets):
  # token-env:
  #   default: GITHUB_PAT_HOME      # override the home floor for unlisted orgs
  #   by-org:
  #     some-org: GITHUB_PAT_SERVICE

# `gx-mcp` MCP server: per-tool gating (design doc
# 2026-07-12-llm-propose-apply-and-mcp-server.md). This block is optional; with
# it absent, every tool takes its category default below. Read-only tools
# default ENABLED, mutating tools default DISABLED -- writes are impossible by
# default. Enabling a mutating tool is your explicit grant: it gives that MCP
# client the same authority as a shell running `gx ... --yes`. The confirm
# token (create-propose -> create-apply, undo-plan -> undo-execute) prevents
# executing a STALE plan, NOT an unreviewed one.
mcp:
  tools:
    # read-only (default true)
    status: true
    repo-discover: true
    change-list: true
    change-get: true
    review-status: true
    doctor: true
    # mutating (default false) -- flip to true only for a client you trust
    create-propose: false
    create-apply: false
    undo-plan: false
    undo-execute: false
